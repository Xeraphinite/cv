[hero]
name = "鄭恪悠"
enName = "Keyou (Key) Zheng"
location = "広州・広東"
age = ""
position = "博士課程志願者、若手研究者、ジュニア設計エンジニア"
bio = """
こんにちは、**Keyou (Key) Zheng** です。私は大学院生であり、若手研究者であり、ジュニア設計エンジニアでもあります。現在の研究は大規模言語モデル、パラメトリック CAD、HCI の交差領域にあり、人間の設計意図を信頼可能で機械実行可能なコードへ変換することに取り組んでいます。

大学院では、生成と検証を閉ループでつなぐエージェント型ワークフローを構築しています。CAD 環境から得られるコンパイラおよび幾何フィードバックを解釈し、表面的な正しさではなく工学的に妥当な結果へ向けてコードを反復的に修復します。

学部での計算機科学の訓練により強固な技術基盤を得る一方、デザインと人間中心コンピューティングの継続的な独学を通じてツールへの考え方を磨いてきました。技術的厳密性と実用性を両立するシステムを重視しています。

研究室の外でも、オープンソース開発、インターフェース設計の実践、執筆を継続しています。タイポグラフィ、明快なインタラクション、保守しやすいコードを大切にし、ソフトウェア・デザイン・研究を横断して価値を届ける作り手として成長することを目指しています。
"""

