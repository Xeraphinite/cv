[[experience]]
position = "コードベース CAD アセンブリ生成"
company = "State Key Lab of Manufacturing Technology & Equipment"
location = ""
startDate = "2025年8月"
endDate = "現在"
summary = "実行可能制約下での制御可能なコードベース CAD 生成に向け、検証可能ベンチマークと LLM エージェントを構築。"
highlights = [
  "エージェント基盤：ツールチェーン固定・再現実行可能な多言語コンテナ型コード実行サンドボックスを構築。大規模実験観測のため、複数軌跡と失敗を収集する水平スケーラブルなバックエンドを設計。高速デバッグと成果物生成のための軽量 Web playground も実装。",
  "ベンチマーク構築：公開リポジトリと CAD コミュニティ由来の 20 万件 CAD コードを基に、決定論・ヒューリスティック（例：あいまい重複除去）と LLM パイプラインで汚染低減と難易度制御を実施。単体 1 万タスク、アセンブリ 1700 タスクを、golden 参照ワークスペースと実行テスト付きで整備。",
  "エージェント設計：自己テストと自己修復で CAD プログラムを生成・編集する LLM アーキテクチャを設計。単一ファイル前提の手法と異なり、アセンブリの複数ファイル環境で特定ツール（自然言語から仕様抽出する spec など）を利用し、閉ループ修正を実現。",
  "評価結果：制約満足度の主要指標として実行テストを採用。アセンブリタスクで pass rate 54.2%、all-tests success 41.9%、invalid outputs 2.4% を達成し、幾何品質を維持しつつ GPT-5 などの LLM-only/ツール系ベースラインを上回る結果。",
  "成果：1 本を ICML 2026（43rd International Conference on Machine Learning）に投稿中。",
]

[[experience]]
position = "Human-in-the-loop CAD 生成ワークフロー"
company = "State Key Lab of Manufacturing Technology & Equipment"
location = ""
startDate = "2024年12月"
endDate = "2025年5月"
summary = "コードベース CAD 生成向けの HITL エージェントワークフローを設計し、コード有効率と人間選好で評価。"
highlights = [
  "ワークフロー設計：微調整済み Qwen2.5-VL-7B を中核に、意図明確化・妥当性検査・反復改善・メモリ・安全ゲーティングを組み合わせ。",
  "結果：実世界 100 モデルで invalid rate と専門家 pairwise Elo を評価し、invalid rate 2%、Elo 1075.5 を達成。Claude、GPT-4o、非エージェント Qwen を上回った。",
  "成果：1 本を Applied Soft Computing に掲載。",
]

