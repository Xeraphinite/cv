startDate = "2023年9月"
endDate = "2026年6月（予定）"
summary = "GPA: 3.62/4.0（上位2.5%）、指導教員：Jiewu Leng 教授；論文：Verifier-Driven Code-based Parametric CAD Generation with Large Language Models Agent（進行中）。"
highlights = [
