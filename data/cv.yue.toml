[[experience]]
position = "基於代碼嘅 CAD 裝配生成"
company = "製造技術與裝備國家重點實驗室"
location = ""
startDate = "2025年8月"
endDate = "而家"
summary = "建立咗可驗證基準同 LLM agent，實現可控嘅代碼式 CAD 生成同可執行約束評測。"
highlights = [
  "Agent 基礎設施：搭建多語言容器化代碼執行沙箱，固定工具鏈並保證可重現；設計可橫向擴展後端，收集多條 agent 軌跡同失敗樣本以支援大規模實驗觀測；亦實作咗輕量 Web playground 方便快速除錯同產物生成。",
  "基準構建：基於公開倉庫同 CAD 社群收集嘅 20 萬人類 CAD 代碼語料，配合確定性同啟發式規則（例如模糊去重）及 LLM pipeline，降低數據污染並控制任務難度；產出 1 萬單體任務同 1700 個裝配任務，附金標準工作區同可執行測試。",
  "Agent 設計：設計咗透過自測同自修復生成/編輯 CAD 程式嘅 LLM 架構。唔同於只支援單文件嘅方法，agent 可以喺多文件裝配工作區調用特定工具（例如由自然語言抽取規格嘅 spec 工具），形成閉環修復。",
  "評測結果：以可執行測試作核心指標衡量約束滿足度。喺裝配任務上，方法達到 54.2% pass rate、41.9% 全測通過率、2.4% 無效輸出率，並喺保持幾何分數競爭力之下，優於 GPT-5 等 LLM-only 同工具基線。",
  "產出：一篇論文已投稿 ICML 2026（43rd International Conference on Machine Learning）並審稿中。",
]

[[experience]]
