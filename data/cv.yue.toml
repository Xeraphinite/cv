highlights = [
  "工作流設計：以微調 Qwen2.5-VL-7B 作 backbone，結合意圖澄清、有效性檢查、迭代優化、記憶同安全閘等模式。",
  "結果：喺 100 個真實模型上以無效率同專家 pairwise Elo 評估，達到 2% 無效率同 1075.5 Elo，優於 Claude、GPT-4o 同非 agent Qwen 基線。",
  "產出：一篇論文發表於 Applied Soft Computing。",
]

