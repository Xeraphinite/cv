[[experience]]
position = "코드 기반 CAD 어셈블리 생성"
company = "State Key Lab of Manufacturing Technology & Equipment"
location = ""
startDate = "2025년 8월"
endDate = "현재"
summary = "실행 가능한 제약 조건 하에서 제어 가능한 코드 기반 CAD 생성을 위해 검증 가능한 벤치마크와 LLM 에이전트를 구축했습니다."
highlights = [
  "에이전트 인프라: 고정된 툴체인과 재현 가능한 실행을 갖춘 다중 언어 컨테이너형 코드 실행 샌드박스를 구축했습니다. 대규모 실험 관측을 위해 다중 에이전트 궤적과 실패를 수집하는 수평 확장 백엔드를 설계했고, 빠른 디버깅과 산출물 생성을 위한 경량 웹 플레이그라운드도 구현했습니다.",
  "벤치마크 구축: 공개 저장소와 CAD 커뮤니티에서 수집한 20만 건의 인간 CAD 코드 코퍼스를 바탕으로, 결정론/휴리스틱 규칙(예: 퍼지 중복 제거)과 LLM 파이프라인을 통해 데이터 오염을 줄이고 난이도를 제어했습니다. 골든 레퍼런스 워크스페이스와 실행 테스트를 포함한 단일 부품 1만 과제, 어셈블리 1700 과제를 구성했습니다.",
  "에이전트 설계: 자체 테스트와 자체 복구를 통해 CAD 프로그램을 생성/수정하는 LLM 아키텍처를 설계했습니다. 단일 파일만 다루는 기존 방식과 달리, 어셈블리용 다중 파일 워크스페이스에서 특정 도구(예: 자연어에서 명세를 추출하는 spec 도구)를 사용해 폐루프 수정이 가능합니다.",
  "평가 결과: 제약 충족도 계산의 핵심 지표로 실행 테스트를 사용했습니다. 어셈블리 과제에서 54.2% pass rate, 41.9% all-tests success, 2.4% invalid outputs를 기록했으며, 기하 품질을 유지하면서 GPT-5 등 LLM-only 및 도구 기반 베이스라인보다 우수했습니다.",
  "성과: 논문 1편이 ICML 2026 (43rd International Conference on Machine Learning)에 심사 중입니다.",
]

