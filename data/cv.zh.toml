[[experience]]
position = "基于代码的 CAD 装配生成"
company = "制造技术与装备国家重点实验室"
location = ""
startDate = "2025年8月"
endDate = "至今"
summary = "构建了可验证基准与 LLM 智能体，实现可控的代码式 CAD 生成与可执行约束评测。"
highlights = [
  "智能体基础设施：搭建多语言容器化代码执行沙箱，固定工具链并保证可复现运行；设计可横向扩展后端，采集多轨迹与失败样本用于大规模实验可观测；并实现轻量 Web playground 以便快速调试与产物生成。",
  "基准构建：基于公开仓库与 CAD 社区收集的 20 万人类 CAD 代码语料，结合确定性与启发式规则（如模糊去重）及 LLM 流水线，降低数据污染并控制任务难度；产出 1 万单体任务与 1700 装配任务，附带金标准工作区与可执行测试。",
  "智能体设计：设计了通过自测与自修复生成/编辑 CAD 程序的 LLM 架构。不同于仅支持单文件的方法，该智能体可在多文件装配工作区调用特定工具（如从自然语言抽取规范的 spec 工具），形成闭环修复。",
  "评测结果：以可执行测试作为核心指标衡量约束满足度。在装配任务上，方法达到 54.2% 通过率、41.9% 全测通过率、2.4% 无效输出率，并在几何分数保持竞争力的同时优于 GPT-5 等 LLM-only 与工具基线。",
  "产出：一篇论文已投稿至 ICML 2026（第 43 届 International Conference on Machine Learning）并在审。",
]

[[experience]]
position = "人机协同 CAD 生成工作流"
company = "制造技术与装备国家重点实验室"
location = ""
startDate = "2024年12月"
endDate = "2025年5月"
summary = "设计了用于代码式 CAD 生成的 HITL 智能体工作流，并以代码有效率与人工偏好进行评估。"
highlights = [
  "工作流设计：以微调 Qwen2.5-VL-7B 为骨干，融合意图澄清、有效性检查、迭代优化、记忆与安全门控等模式。",
  "结果：在 100 个真实模型上以无效率与专家两两 Elo 评估，达到 2% 无效率与 1075.5 Elo，优于 Claude、GPT-4o 与非智能体 Qwen 基线。",
  "产出：一篇论文发表于 Applied Soft Computing。",
]

[[experience]]
position = "自动化色差控制与校准"
company = "Vograce"
location = "浙江义乌"
startDate = "2024年12月"
endDate = "2025年7月"
summary = "构建了用于定制化印刷生产的机器视觉闭环色彩一致性控制流程。"
highlights = [
  "采集与检测：设计光学采集环境，构建特征匹配对齐与 ROI 提取流程，以适配不同印刷图案、光照变化与材料反射差异，实现稳健的 Delta E（CIEDE2000）计算。",
  "算法：将 sRGB 测量值转换到 CMYK 空间，并通过自适应迭代步长反馈，将测得色差转化为可执行的墨量调节建议，辅助机台操作员快速校正。",
  "结果：通过高频迭代以 Gradio 快速原型验证，将整条检测与推荐流程优化至 <=1 秒/图；在试产线上较人工调色提速超过 20 倍。随后以 Next.js + FastAPI 完成全栈工程化并支持企业部署。",
  "产出：获得两项软件著作权授权。",
]

