[hero]
name = "郑恪悠"
enName = "Keyou (Key) Zheng"
location = "广东广州"
age = ""
position = "博士申请者，新手研究员，初级设计工程师"
bio = """
你好，我是 **Keyou (Key) Zheng**。我是一名研究生、新手研究员和初级设计工程师。当前工作位于大语言模型、参数化 CAD 与人机交互的交叉点，重点是把人类设计意图转化为可靠、可由机器执行的代码。

在研究生阶段，我构建了连接“生成-验证”的智能体工作流闭环。系统会解析 CAD 环境中的编译与几何反馈，并迭代修复代码，使结果达到工程可用标准，而不仅是表面正确。

本科计算机科学训练为我提供了扎实的技术基础，而在设计与人本计算方向持续的自学，塑造了我对工具系统的理解。我关注技术严谨性与真实可用性的统一。

在实验室之外，我持续通过开源项目、界面设计实践与写作进行构建。我重视排版、清晰交互和可维护代码，并希望成长为能够在软件、设计与研究之间交付高质量成果的实践者。
"""

